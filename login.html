<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Login - Odonto Prime</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="bg-login">

<div class="login-box">

    <div class="logo-area">
        <i class="fa-solid fa-tooth"></i>
        <h1>Odonto Prime</h1>
        <p>
            Seu sorriso em boas mãos
        </p>
    </div>

    <h2>Entrar</h2>

    <div class="input-box">

        <i class="fa-solid fa-envelope"></i>

        <input
        type="email"
        id="email"
        placeholder="Digite seu e-mail">

    </div>

    <div class="input-box">

        <i class="fa-solid fa-lock"></i>

        <input
        type="password"
        id="senha"
        placeholder="Digite sua senha">

    </div>

    <button onclick="login()">
        Entrar
    </button>

    <p class="link">
        Não possui conta?

        <a href="cadastro.html">
            Cadastre-se
        </a>
    </p>

</div>

<script src="auth.js"></script>

</body>
</html>
